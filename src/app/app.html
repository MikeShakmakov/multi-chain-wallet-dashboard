<div class="p-4">
  <h1 class="text-2xl mb-4">Multi-Chain Wallet Dashboard</h1>

  <mat-form-field class="w-xs">
    <mat-label>Chains</mat-label>
    <mat-select [formControl]="form.controls.chain">
      @for (chain of chains(); track chain) {
        <mat-option [value]="chain.name">{{chain.name}} ({{chain.nativeCurrency?.symbol}})</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <div>
    <mat-form-field class="w-xl">
      <mat-label>Address</mat-label>
      <input [formControl]="form.controls.address" matInput placeholder="">
    </mat-form-field>
  </div>

  <button [disabled]="form.invalid || form.pristine" matButton>Show the balance</button>

  <h2 class="text-xl">Balance</h2>


</div>
